<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <title>Always Raycast-first shared prompt architecture</title>
  <desc>Raycast, Codex, Claude Code, and direct CLI commands call one Always core and read the same personal sentence database in the user home folder.</desc>

  <rect x="30" y="28" width="700" height="122" rx="12" fill="none" stroke="#3d444d"/>
  <text x="54" y="56" fill="#9198a1" font-size="11.5">entry points — choose whichever is fastest in the current context</text>

  <rect x="58" y="78" width="150" height="48" rx="8" fill="none" stroke="#ff8a8a" stroke-width="1.8"/>
  <text x="133" y="99" text-anchor="middle" fill="#f0f6fc" font-size="13.5" font-weight="700">Raycast</text>
  <text x="133" y="117" text-anchor="middle" fill="#9198a1" font-size="11">Always · ⌥⌥</text>

  <rect x="226" y="78" width="150" height="48" rx="8" fill="none" stroke="#3d444d"/>
  <text x="301" y="99" text-anchor="middle" fill="#f0f6fc" font-size="13.5" font-weight="700">Codex</text>
  <text x="301" y="117" text-anchor="middle" fill="#9198a1" font-size="11">$always</text>

  <rect x="394" y="78" width="150" height="48" rx="8" fill="none" stroke="#3d444d"/>
  <text x="469" y="99" text-anchor="middle" fill="#f0f6fc" font-size="13.5" font-weight="700">Claude Code</text>
  <text x="469" y="117" text-anchor="middle" fill="#9198a1" font-size="11">/always</text>

  <rect x="562" y="78" width="140" height="48" rx="8" fill="none" stroke="#3d444d"/>
  <text x="632" y="99" text-anchor="middle" fill="#f0f6fc" font-size="13.5" font-weight="700">CLI</text>
  <text x="632" y="117" text-anchor="middle" fill="#9198a1" font-size="11">always.py</text>

  <rect x="218" y="208" width="324" height="86" rx="10" fill="none" stroke="#4493f8" stroke-width="2"/>
  <text x="380" y="238" text-anchor="middle" fill="#f0f6fc" font-size="16" font-weight="700">Always core</text>
  <text x="380" y="260" text-anchor="middle" fill="#9198a1" font-size="11.5">search · variables · backup · picker · paste</text>
  <text x="380" y="278" text-anchor="middle" fill="#9198a1" font-size="11.5">one source checkout — no personal data</text>

  <path d="M 133 126 C 133 172, 244 190, 290 207" stroke="#4493f8" stroke-width="1.8" fill="none" marker-end="url(#arrBlue)"/>
  <path d="M 301 126 L 340 205" stroke="#4493f8" stroke-width="1.8" fill="none" marker-end="url(#arrBlue)"/>
  <path d="M 469 126 L 420 205" stroke="#4493f8" stroke-width="1.8" fill="none" marker-end="url(#arrBlue)"/>
  <path d="M 632 126 C 632 172, 516 190, 470 207" stroke="#4493f8" stroke-width="1.8" fill="none" marker-end="url(#arrBlue)"/>

  <rect x="50" y="338" width="660" height="104" rx="12" fill="none" stroke="#3d444d"/>
  <text x="74" y="366" fill="#9198a1" font-size="11.5">your home folder — personal runtime data</text>

  <rect x="230" y="384" width="300" height="42" rx="8" fill="none" stroke="#4493f8" stroke-width="2"/>
  <text x="380" y="410" text-anchor="middle" fill="#f0f6fc" font-size="15" font-weight="700">~/.always/sentences.json</text>

  <text x="380" y="452" text-anchor="middle" fill="#9198a1" font-size="11">prompts · tags · categories · variables · single rolling backup before writes</text>

  <path d="M 380 294 L 380 378" stroke="#4493f8" stroke-width="2" fill="none" marker-end="url(#arrBlue)"/>
  <text x="397" y="338" fill="#4493f8" font-size="11.5" font-weight="600">read / write</text>

  <defs>
    <marker id="arrBlue" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#4493f8" stroke-width="1.6"/>
    </marker>
  </defs>
</svg>
