<svg viewBox="0 0 700 430" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <title>Always shared sentence library architecture</title>
  <desc>Codex and Claude Code use one linked Always skill and read the same personal sentence database in the user home folder.</desc>

  <rect x="190" y="14" width="320" height="58" rx="8" fill="none" stroke="#3d444d" stroke-dasharray="5 4"/>
  <text x="350" y="38" text-anchor="middle" fill="#f0f6fc" font-size="14" font-weight="600">Always skill + CLI</text>
  <text x="350" y="58" text-anchor="middle" fill="#9198a1" font-size="11.5">one source checkout — no personal data</text>

  <path d="M 270 72 L 165 116" stroke="#3d444d" stroke-width="1.5" fill="none" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <path d="M 430 72 L 535 116" stroke="#3d444d" stroke-width="1.5" fill="none" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <text x="172" y="98" text-anchor="middle" fill="#9198a1" font-size="10.5">~/.claude/skills/</text>
  <text x="530" y="98" text-anchor="middle" fill="#9198a1" font-size="10.5">~/.agents/skills/</text>

  <rect x="60" y="120" width="210" height="64" rx="8" fill="none" stroke="#3d444d"/>
  <text x="165" y="146" text-anchor="middle" fill="#f0f6fc" font-size="14" font-weight="600">Claude Code</text>
  <text x="165" y="166" text-anchor="middle" fill="#9198a1" font-size="11.5">/always</text>

  <rect x="430" y="120" width="210" height="64" rx="8" fill="none" stroke="#3d444d"/>
  <text x="535" y="146" text-anchor="middle" fill="#f0f6fc" font-size="14" font-weight="600">Codex</text>
  <text x="535" y="166" text-anchor="middle" fill="#9198a1" font-size="11.5">$always</text>

  <rect x="40" y="212" width="620" height="200" rx="10" fill="none" stroke="#3d444d"/>
  <text x="60" y="238" fill="#9198a1" font-size="11.5">your home folder — personal runtime data</text>

  <rect x="230" y="258" width="240" height="82" rx="10" fill="none" stroke="#4493f8" stroke-width="2"/>
  <text x="350" y="285" text-anchor="middle" fill="#f0f6fc" font-size="15" font-weight="700">~/.always/sentences.json</text>
  <text x="350" y="307" text-anchor="middle" fill="#9198a1" font-size="11.5">prompts · tags · categories · variables</text>
  <text x="350" y="326" text-anchor="middle" fill="#4493f8" font-size="11.5" font-weight="600">one library shared by both agents</text>

  <rect x="250" y="362" width="200" height="30" rx="6" fill="none" stroke="#3d444d" stroke-dasharray="4 3"/>
  <text x="350" y="382" text-anchor="middle" fill="#9198a1" font-size="10.5">rolling backup before writes</text>

  <path d="M 150 184 C 150 246, 208 272, 225 284" stroke="#4493f8" stroke-width="2" fill="none" marker-end="url(#arrB)"/>
  <text x="141" y="248" text-anchor="middle" fill="#4493f8" font-size="11" font-weight="600">pick / manage</text>

  <path d="M 550 184 C 550 246, 492 272, 475 284" stroke="#4493f8" stroke-width="2" fill="none" marker-end="url(#arrB)"/>
  <text x="559" y="248" text-anchor="middle" fill="#4493f8" font-size="11" font-weight="600">pick / manage</text>

  <path d="M 350 340 L 350 357" stroke="#9198a1" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#9198a1" stroke-width="1.5"/>
    </marker>
    <marker id="arrB" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#4493f8" stroke-width="1.5"/>
    </marker>
  </defs>
</svg>
